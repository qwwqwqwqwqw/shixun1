<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>icar 教室导航 — Web 控制台</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
    h1 { color: #07c160; }
    .control-section { background: #fff; padding: 20px; border-radius: 8px; margin: 10px 0; }
    input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; width: 200px; }
    button { padding: 8px 20px; margin: 0 5px; border: none; border-radius: 4px; cursor: pointer; }
    .btn-nav { background: #07c160; color: #fff; }
    .btn-face { background: #576b95; color: #fff; }
    #statusDisplay { background: #1e1e1e; color: #0f0; padding: 12px; border-radius: 4px; min-height: 80px; }
  </style>
</head>
<body>
  <h1>icar 智能教室导航 — Web 控制台</h1>

  <div class="control-section">
    <h2>手动导航</h2>
    <input id="roomInput" placeholder="输入教室号 (如 101)">
    <button class="btn-nav" onclick="sendRoom()">导航</button>
  </div>

  <div class="control-section">
    <h2>人脸识别导航</h2>
    <button class="btn-face" onclick="startFace()">触发人脸识别</button>
  </div>

  <div class="control-section">
    <h2>导航状态</h2>
    <pre id="statusDisplay">等待指令...</pre>
  </div>

  <script src="script.js"></script>
</body>
</html>
